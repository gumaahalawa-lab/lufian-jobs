<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Lufian Jobs</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <style>

    :root{--pi:#6c35de;--pi-dark:#4a1fa8;--pi-light:#9b6ef3;--gold:#f5a623;--green:#27ae60;--red:#e74c3c;--bg:#0f0c1a;--card:#1a1530;--card2:#221d3a;--text:#f0eaff;--muted:#8a7faa;--border:#2e2650;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);min-height:100vh;font-family:'Inter',sans-serif;}
    body[dir="rtl"]{font-family:'Cairo',sans-serif;}
    nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;}
    .nav-logo{display:flex;align-items:center;gap:10px;}
    .nav-logo img{width:38px;height:38px;border-radius:10px;}
    .nav-logo-text{font-size:1.1rem;font-weight:900;color:var(--pi-light);}
    .btn-login{background:var(--pi);color:#fff;border:none;padding:7px 16px;border-radius:25px;font-weight:700;cursor:pointer;font-size:.85rem;font-family:inherit;}
    .hero{background:linear-gradient(135deg,var(--pi-dark),var(--bg));padding:36px 16px 22px;text-align:center;}
    .hero h1{font-size:1.8rem;font-weight:900;margin-bottom:8px;line-height:1.3;}
    .hero h1 span{color:var(--gold);}
    .hero p{color:var(--muted);font-size:.9rem;margin-bottom:18px;}
    .stats-bar{display:flex;justify-content:center;gap:22px;padding:14px;flex-wrap:wrap;}
    .stat{text-align:center;}
    .stat-num{font-size:1.3rem;font-weight:900;color:var(--pi-light);}
    .stat-label{font-size:.72rem;color:var(--muted);}
    .section{padding:14px 16px;max-width:1100px;margin:0 auto;}
    .section-title{font-size:1.05rem;font-weight:700;margin-bottom:12px;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:.2s;}
    .card:hover{border-color:var(--pi-light);transform:translateY(-2px);}
    .card-icon{height:110px;background:linear-gradient(135deg,var(--pi-dark),var(--card2));display:flex;align-items:center;justify-content:center;font-size:2.6rem;}
    .card-body{padding:12px;}
    .card-title{font-size:.9rem;font-weight:700;margin-bottom:4px;}
    .card-sub{font-size:.78rem;color:var(--muted);margin-bottom:6px;}
    .card-price{color:var(--gold);font-weight:900;font-size:.9rem;}
    .badge{background:rgba(245,166,35,0.15);color:var(--gold);padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:700;}
    .action-btn{background:var(--pi);color:#fff;border:none;padding:8px 16px;border-radius:10px;font-weight:700;cursor:pointer;font-size:.82rem;font-family:inherit;width:100%;margin-top:8px;}
    .search-bar{display:flex;gap:8px;max-width:480px;margin:0 auto;}
    .search-bar input{flex:1;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:25px;font-size:.9rem;outline:none;font-family:inherit;}
    .search-bar button{background:var(--pi);color:#fff;border:none;padding:10px 18px;border-radius:25px;font-weight:700;cursor:pointer;font-family:inherit;}
    .tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
    .tab{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:20px;cursor:pointer;font-size:.82rem;font-family:inherit;transition:.2s;}
    .tab.active,.tab:hover{background:var(--pi);border-color:var(--pi);}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;padding:16px;}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--card);border-radius:18px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:20px;}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
    .modal-title{font-size:1.1rem;font-weight:900;}
    .close-btn{background:var(--card2);border:none;color:var(--text);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;}
    .form-group{margin-bottom:12px;}
    .form-label{font-size:.85rem;color:var(--muted);margin-bottom:5px;display:block;}
    .form-input{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:10px;font-size:.9rem;outline:none;font-family:inherit;}
    .submit-btn{width:100%;background:linear-gradient(135deg,var(--pi),var(--pi-dark));color:#fff;border:none;padding:12px;border-radius:12px;font-weight:700;font-size:.95rem;cursor:pointer;font-family:inherit;}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 22px;border-radius:28px;font-weight:700;z-index:999;display:none;}
    @media(max-width:600px){.hero h1{font-size:1.4rem;}.grid{grid-template-columns:1fr;}}


    .lang-bar{display:flex;flex-wrap:wrap;gap:5px;padding:8px 12px;background:rgba(108,53,222,0.12);border-bottom:1px solid var(--border);justify-content:center;}
    .lang-btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:#ccc;padding:3px 9px;border-radius:20px;cursor:pointer;font-size:0.72rem;transition:.2s;font-family:inherit;}
    .lang-btn:hover,.lang-btn.active{background:var(--pi);border-color:var(--pi);color:#fff;}

    .job-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;transition:.2s;}
    .job-card:hover{border-color:var(--pi-light);}
    .job-header{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
    .company-logo{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--pi-dark),var(--card2));display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
    .job-title{font-weight:700;font-size:.95rem;}
    .job-company{font-size:.78rem;color:var(--muted);}
    .job-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
    .job-tag{background:var(--card2);border:1px solid var(--border);padding:2px 8px;border-radius:10px;font-size:.72rem;color:var(--muted);}
    .job-salary{color:var(--gold);font-weight:700;font-size:.9rem;}
    .apply-btn{background:var(--pi);color:#fff;border:none;padding:7px 16px;border-radius:10px;font-weight:700;cursor:pointer;font-size:.82rem;font-family:inherit;}
    .post-btn{background:var(--gold);color:#000;border:none;padding:7px 14px;border-radius:25px;font-weight:700;cursor:pointer;font-size:.85rem;font-family:inherit;}
  </style>
</head>
<body>
<div class="lang-bar" id="langBar"></div>
<nav>
  <div class="nav-logo">

</div>
<div class="toast" id="toast"></div>

  document.getElementById('heroTitle').innerHTML=lb.hero;

  document.getElementById('tabsRow').innerHTML=lb.tabs.map(function(t,i){return '<button class="tab'+(i===0?' active':'')+'" onclick="this.parentNode.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active')});this.classList.add('active')">'+t+'</button>';}).join('');
  document.getElementById('jobsList').innerHTML=lb.jobs.map(function(j){
    return '<div class="job-card"><div class="job-header"><div class="company-logo">'+j.icon+'</div><div><div class="job-title">'+j.title+'</div><div class="job-company">'+j.company+'</div></div></div><div class="job-tags">'+j.tags.map(function(t){return '<span class="job-tag">'+t+'</span>';}).join('')+'</div><div style="display:flex;justify-content:space-between;align-items:center"><span class="job-salary">'+j.salary+'</span><button class="apply-btn" onclick="applyJob(''+j.title+'')">'+lb.applyText+'</button></div></div>';
  }).join('');
}
function openPost(){document.getElementById('postModal').classList.add('open');}
function closePost(){document.getElementById('postModal').classList.remove('open');}
function postJob(){
  var title=document.getElementById('jobTitle').value;
  if(!title){showToast('Enter job title');return;}
  Pi.createPayment({amount:1,memo:'Lufian Jobs Post: '+title,metadata:{app:'lufian-jobs'}},{onReadyForServerApproval:function(){},onReadyForServerCompletion:function(id,txid){showToast('Job posted!');closePost();},onCancel:function(){},onError:function(e){}});
}
function applyJob(title){showToast('Applied to: '+title);}
renderAll();

}catch(e){ console.log('Pi SDK error:',e); }
  }, 500);
});

// Auto-authenticate on load as required by Pi App Studio
window.addEventListener('load', function(){
  try{
    Pi.init({version:'2.0'});
  }catch(e){}
  try{
    Pi.authenticate(['username','payments'], function(p){ console.log('Incomplete:',p); }).then(function(auth){
      if(auth && auth.user){
        try{ var btn=document.getElementById('loginBtn'); if(btn) btn.textContent=auth.user.username; }catch(e){}
        try{ var un=document.getElementById('userName'); if(un) un.textContent=auth.user.username; }catch(e){}
        try{ var ub=document.getElementById('userBar'); if(ub) ub.classList.add('visible'); }catch(e){}
      }
    }).catch(function(e){ console.log('Auth error:',e); });
  }catch(e){ console.log('Pi SDK error:',e); }
});

</script>
