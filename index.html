<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Lufian Jobs</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root{--pi:#6c35de;--pi-dark:#4a1fa8;--pi-light:#9b6ef3;--gold:#f5a623;--green:#27ae60;--bg:#0f0c1a;--card:#1a1530;--card2:#221d3a;--text:#f0eaff;--muted:#8a7faa;--border:#2e2650;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);min-height:100vh;font-family:'Inter',sans-serif;}
    nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;}
    .nav-logo{font-size:1.2rem;font-weight:900;color:var(--pi-light);}
    .btn{background:var(--pi);color:#fff;border:none;padding:8px 18px;border-radius:25px;font-weight:700;cursor:pointer;font-size:.85rem;font-family:inherit;}
    .btn-gold{background:var(--gold);color:#000;border:none;padding:8px 14px;border-radius:25px;font-weight:700;cursor:pointer;font-size:.85rem;font-family:inherit;}
    .hero{background:linear-gradient(135deg,var(--pi-dark),var(--bg));padding:36px 16px 22px;text-align:center;}
    .hero h1{font-size:1.8rem;font-weight:900;margin-bottom:8px;}
    .hero h1 span{color:var(--gold);}
    .hero p{color:var(--muted);margin-bottom:18px;}
    .search-bar{display:flex;gap:8px;max-width:480px;margin:0 auto;}
    .search-bar input{flex:1;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:25px;font-size:.9rem;outline:none;font-family:inherit;}
    .stats-bar{display:flex;justify-content:center;gap:22px;padding:14px;flex-wrap:wrap;}
    .stat{text-align:center;}
    .stat-num{font-size:1.3rem;font-weight:900;color:var(--pi-light);}
    .stat-label{font-size:.72rem;color:var(--muted);}
    .section{padding:14px 16px;max-width:900px;margin:0 auto;}
    .section-title{font-size:1.05rem;font-weight:700;margin-bottom:12px;}
    .tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
    .tab{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:20px;cursor:pointer;font-size:.82rem;font-family:inherit;transition:.2s;}
    .tab.active{background:var(--pi);border-color:var(--pi);}
    .job-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;transition:.2s;}
    .job-card:hover{border-color:var(--pi-light);}
    .job-header{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
    .company-logo{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--pi-dark),var(--card2));display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
    .job-title{font-weight:700;font-size:.95rem;}
    .job-company{font-size:.78rem;color:var(--muted);}
    .job-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
    .job-tag{background:var(--card2);border:1px solid var(--border);padding:2px 8px;border-radius:10px;font-size:.72rem;color:var(--muted);}
    .job-footer{display:flex;justify-content:space-between;align-items:center;}
    .job-salary{color:var(--gold);font-weight:700;font-size:.9rem;}
    .apply-btn{background:var(--pi);color:#fff;border:none;padding:7px 16px;border-radius:10px;font-weight:700;cursor:pointer;font-size:.82rem;font-family:inherit;}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;padding:16px;}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--card);border-radius:18px;width:100%;max-width:500px;padding:20px;}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
    .modal-title{font-size:1.1rem;font-weight:900;}
    .close-btn{background:var(--card2);border:none;color:var(--text);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;}
    .form-group{margin-bottom:12px;}
    .form-label{font-size:.85rem;color:var(--muted);margin-bottom:5px;display:block;}
    .form-input{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:10px;font-size:.9rem;outline:none;font-family:inherit;}
    .submit-btn{width:100%;background:linear-gradient(135deg,var(--pi),var(--pi-dark));color:#fff;border:none;padding:12px;border-radius:12px;font-weight:700;font-size:.95rem;cursor:pointer;font-family:inherit;}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 22px;border-radius:28px;font-weight:700;z-index:999;display:none;}
    @media(max-width:600px){.hero h1{font-size:1.4rem;}}
  </style>
</head>
<body>
<nav>
  <div class="nav-logo">💼 LUFIAN JOBS</div>
  <div style="display:flex;gap:8px">
    <button class="btn-gold" onclick="openPost()">+ Post Job</button>
    <button class="btn" id="loginBtn" onclick="loginWithPi()">Login with Pi</button>
  </div>
</nav>
<div class="hero">
  <h1>Find Jobs in the <span>Pi Economy</span></h1>
  <p>Thousands of jobs paying in Pi cryptocurrency worldwide</p>
  <div class="search-bar">
    <input type="text" placeholder="Job title or skill..."/>
    <button class="btn">Search</button>
  </div>
</div>
<div class="stats-bar">
  <div class="stat"><div class="stat-num">12K+</div><div class="stat-label">Active Jobs</div></div>
  <div class="stat"><div class="stat-num">5K+</div><div class="stat-label">Companies</div></div>
  <div class="stat"><div class="stat-num">80+</div><div class="stat-label">Countries</div></div>
  <div class="stat"><div class="stat-num">Pi</div><div class="stat-label">Salary Currency</div></div>
</div>
<div class="section">
  <div class="tabs" id="tabsRow"></div>
  <div class="section-title">Latest Jobs</div>
  <div id="jobsList"></div>
</div>
<div class="modal-overlay" id="postModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Post a Job</div>
      <button class="close-btn" onclick="closePost()">X</button>
    </div>
    <div class="form-group"><label class="form-label">Job Title</label><input class="form-input" id="jobTitle" placeholder="e.g. Pi App Developer"/></div>
    <div class="form-group"><label class="form-label">Company</label><input class="form-input" id="jobComp" placeholder="Your company name"/></div>
    <div class="form-group"><label class="form-label">Salary (pi/month)</label><input class="form-input" id="jobSal" type="number" placeholder="100"/></div>
    <div class="form-group"><label class="form-label">Description</label><textarea class="form-input" id="jobDesc" rows="3"></textarea></div>
    <button class="submit-btn" onclick="postJob()">Post Job for 1 Pi</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var jobs = [
  {title:'Pi App Developer',company:'Pi Ventures',salary:'500 pi/mo',tags:['Remote','Full-time','React'],icon:'💻'},
  {title:'Blockchain Analyst',company:'CryptoPI Ltd',salary:'600 pi/mo',tags:['Remote','Finance','Crypto'],icon:'📊'},
  {title:'UI/UX Designer',company:'PiDesign Co',salary:'400 pi/mo',tags:['Remote','Part-time','Figma'],icon:'🎨'},
  {title:'Community Manager',company:'Pi Network',salary:'300 pi/mo',tags:['Remote','Marketing'],icon:'🌐'},
  {title:'Content Writer',company:'PiMedia',salary:'200 pi/mo',tags:['Freelance','Writing'],icon:'✍️'},
  {title:'Pi SDK Engineer',company:'Pi Labs',salary:'700 pi/mo',tags:['Remote','Full-time','Node.js'],icon:'🔧'},
  {title:'Data Scientist',company:'PiAnalytics',salary:'650 pi/mo',tags:['Remote','AI','Python'],icon:'🤖'}
];

var tabs = ['All','Remote','Full-time','Part-time','Freelance'];

function renderTabs() {
  var row = document.getElementById('tabsRow');
  row.innerHTML = '';
  tabs.forEach(function(t, i) {
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.textContent = t;
    btn.onclick = function() {
      row.querySelectorAll('.tab').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
    };
    row.appendChild(btn);
  });
}

function renderJobs() {
  var list = document.getElementById('jobsList');
  list.innerHTML = '';
  jobs.forEach(function(j) {
    var card = document.createElement('div');
    card.className = 'job-card';

    var tagsHtml = j.tags.map(function(t) {
      return '<span class="job-tag">' + t + '</span>';
    }).join('');

    card.innerHTML = '<div class="job-header">' +
      '<div class="company-logo">' + j.icon + '</div>' +
      '<div><div class="job-title">' + j.title + '</div>' +
      '<div class="job-company">' + j.company + '</div></div></div>' +
      '<div class="job-tags">' + tagsHtml + '</div>' +
      '<div class="job-footer">' +
      '<span class="job-salary">' + j.salary + '</span>' +
      '<button class="apply-btn" onclick="applyJob(this)">Apply</button>' +
      '</div>';

    list.appendChild(card);
  });
}

function applyJob(btn) {
  var title = btn.closest('.job-card').querySelector('.job-title').textContent;
  showToast('Applying for: ' + title);
}

function openPost() { document.getElementById('postModal').classList.add('open'); }
function closePost() { document.getElementById('postModal').classList.remove('open'); }

function postJob() {
  var title = document.getElementById('jobTitle').value;
  if (!title) { showToast('Enter job title'); return; }
  Pi.createPayment(
    {amount: 1, memo: 'Lufian Jobs Post: ' + title, metadata: {app: 'lufian-jobs'}},
    {
      onReadyForServerApproval: function() {},
      onReadyForServerCompletion: function(id, txid) { showToast('Job posted!'); closePost(); },
      onCancel: function() {},
      onError: function(e) { console.log(e); }
    }
  );
}

function loginWithPi() {
  Pi.authenticate(['username', 'payments'], function() {}).then(function(auth) {
    if (auth && auth.user) {
      document.getElementById('loginBtn').textContent = auth.user.username;
      showToast('Welcome ' + auth.user.username);
    }
  }).catch(function(e) { console.log(e); });
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(function() { t.style.display = 'none'; }, 2500);
}

renderTabs();
renderJobs();

window.addEventListener('load', function() {
  try { Pi.init({version: '2.0'}); } catch(e) {}
  try {
    Pi.authenticate(['username', 'payments'], function(p) { console.log('Incomplete:', p); }).then(function(auth) {
      if (auth && auth.user) {
        try { document.getElementById('loginBtn').textContent = auth.user.username; } catch(e) {}
      }
    }).catch(function(e) { console.log('Auth error:', e); });
  } catch(e) { console.log('Pi SDK error:', e); }
});
</script>
</body>
</html>
